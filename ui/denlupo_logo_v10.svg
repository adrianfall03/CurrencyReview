  <!-- ── lupo ── -->
  <text x="340" y="494" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="17" font-weight="400" letter-spacing="13"
        fill="#666">lupo</text>

</svg>
