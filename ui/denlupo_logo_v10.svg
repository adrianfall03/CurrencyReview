<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>denlupo</title>
  <desc>Abstract wolf logo with claw-mark letterforms</desc>

  <!-- ── Wolf mark ── -->
  <path d="M 340 32 L 270 88 L 185 68 L 210 155 A 168 168 0 1 0 470 155 L 495 68 L 410 88 Z" fill="#1a1a1a"/>
  <polygon points="267,100 232,82 255,148" fill="#888"/>
  <polygon points="413,100 448,82 425,148" fill="#888"/>
  <circle cx="340" cy="205" r="108" fill="#f0f0f0"/>
  <circle cx="302" cy="188" r="17" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="7"/>
  <circle cx="378" cy="188" r="17" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="7"/>
  <polygon points="340,228 323,250 357,250" fill="#1a1a1a"/>

  <!-- ── d stem ── -->
  <path d="M 278,385 Q 287,423 278,462 Q 269,423 278,385 Z"
        fill="#faf9f5" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- ── d bowl ── -->
  <path d="M 272,410 C 246,407 214,420 214,436 C 214,452 246,465 272,462
           L 264,462 C 246,461 228,451 228,436 C 228,421 246,411 264,410 Z"
        fill="#faf9f5" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- ── e: three claw marks ── -->
  <path d="M 298,413 Q 331,405 365,413 Q 331,421 298,413 Z"
        fill="#faf9f5" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 298,436 Q 327,428 354,436 Q 327,444 298,436 Z"
        fill="#faf9f5" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 298,459 Q 331,451 365,459 Q 331,467 298,459 Z"
        fill="#faf9f5" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ── n: two stems + arc ── -->
  <path d="M 385,412 Q 394,437 385,462 Q 376,437 385,412 Z"
        fill="#faf9f5" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M 385,412 Q 418,398 451,412 Q 418,426 385,412 Z"
