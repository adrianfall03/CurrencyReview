name: Fetch Mizuho CSV

on:
  schedule:
    # Weekdays at 03:00 UTC (12:00 JST) — after Mizuho updates their file
    - cron: '0 3 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm install playwright @vercel/blob

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Download Mizuho CSV and upload to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/sync-mizuho.mjs
